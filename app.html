<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>DigiKhata</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/app.css" />
  </head>

  <body class="light-mode">
    <div class="toast-container" id="toast-container"></div>

    <header class="navbar">
      <div class="logo"><i class="fas fa-wallet"></i> DigiKhata</div>
      <select id="theme-toggle" class="theme-select" aria-label="Select Theme">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
      </select>
    </header>

    <main class="container">
      <!-- Top Section: Overview -->
      <section
        class="overview view-section mobile-active"
        id="overview-section"
      >
        <div class="card balance-card">
          <h3>Total Balance</h3>
          <h2 id="total-balance">₹0.00</h2>
        </div>
        <div class="overview-grid">
          <div class="card income-card">
            <h3>Total Income <i class="fas fa-arrow-up"></i></h3>
            <p id="total-income">₹0.00</p>
          </div>
          <div class="card expense-card">
            <h3>Total Expense <i class="fas fa-arrow-down"></i></h3>
            <p id="total-expense">₹0.00</p>
          </div>
          <div class="card savings-card">
            <h3>Total Savings <i class="fas fa-piggy-bank"></i></h3>
            <p id="total-savings">₹0.00</p>
          </div>
        </div>
      </section>

      <div class="grid-layout">
        <!-- Left Column: Form & Chart -->
        <div class="left-column">
          <section class="add-transaction card view-section" id="view-add">
            <h3 id="form-title">Add New Transaction</h3>
            <form id="transaction-form">
              <input type="hidden" id="edit-id" value="" />
              <div class="form-group">
                <label for="title">Title</label>
                <input
                  type="text"
                  id="title"
                  placeholder="e.g. Groceries"
                  required
                />
              </div>
              <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input
                  type="number"
                  id="amount"
                  placeholder="e.g. 500"
                  step="0.01"
                  required
                />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="type">Type</label>
                  <select id="type" required>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="category">Category</label>
                  <select id="category" required>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Bills">Bills</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Salary">Salary</option>
                    <option value="Health">Health</option>
                    <option value="Savings">Savings</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required />
              </div>
              <div class="form-actions">
                <button type="submit" class="btn primary-btn">
                  <i class="fas fa-plus"></i>
                  <span id="submit-btn-text">Add Transaction</span>
                </button>
                <button
                  type="button"
                  class="btn outline-btn hidden"
                  id="cancel-edit-btn"
                >
                  Cancel
                </button>
              </div>
            </form>
          </section>
          <!--Expence chart (pie chart)-->
          <section
            class="chart-container card view-section mobile-active"
            id="view-analytics"
          >
            <h3>Expense Distribution</h3>
            <div class="canvas-wrapper">
              <canvas id="expense-chart"></canvas>
            </div>
          </section>
        </div>

        <!-- Right Column: Recent Transactions -->
        <div class="right-column">
          <section
            class="transactions card view-section mobile-active"
            id="view-transactions"
          >
            <div class="section-header">
              <h3>Recent Transactions</h3>
              <div class="controls">
                <input
                  type="text"
                  id="search-input"
                  placeholder="Search by title..."
                  autocomplete="off"
                />
                <select id="filter-category" aria-label="Filter by Category">
                  <option value="All">All Categories</option>
                  <option value="Food">Food</option>
                  <option value="Travel">Travel</option>
                  <option value="Bills">Bills</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Salary">Salary</option>
                  <option value="Health">Health</option>
                  <option value="Savings">Savings</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="transactions-list" id="transactions-list">
              <!-- Transactions injected by JS -->
            </div>
            <div id="empty-state" class="empty-state hidden">
              <img
                src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png"
                alt="No transactions"
              />
              <p>No transactions found.</p>
            </div>
          </section>
        </div>
      </div>
    </main>

    <!-- Bottom Navigation Bar for Mobile -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home">
        <i class="fas fa-list"></i>
        <span>Home</span>
      </button>
      <button class="nav-item add-fab" data-view="add">
        <div class="fab-icon-wrapper">
          <i class="fas fa-plus"></i>
        </div>
      </button>
      <button class="nav-item" data-view="analytics">
        <i class="fas fa-chart-pie"></i>
        <span>Analytics</span>
      </button>
    </nav>

    <script src="js/app.js"></script>
  </body>
</html>
