<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">
    <div class="toast-container" id="toast-container"></div>

    <header class="navbar">
        <div class="logo">
            <i class="fas fa-wallet"></i> SmartExpense
        </div>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <main class="container">
        <!-- Top Section: Overview -->
        <section class="overview">
            <div class="card balance-card">
                <h3>Total Balance</h3>
                <h2 id="total-balance">₹0.00</h2>
            </div>
            <div class="card income-card">
                <h3>Total Income <i class="fas fa-arrow-up"></i></h3>
                <p id="total-income">₹0.00</p>
            </div>
            <div class="card expense-card">
                <h3>Total Expense <i class="fas fa-arrow-down"></i></h3>
                <p id="total-expense">₹0.00</p>
            </div>
        </section>

        <div class="grid-layout">
            <!-- Left Column: Form & Chart -->
            <div class="left-column">
                <section class="add-transaction card">
                    <h3 id="form-title">Add New Transaction</h3>
                    <form id="transaction-form">
                        <input type="hidden" id="edit-id" value="">
                        <div class="form-group">
                            <label for="title">Title</label>
                            <input type="text" id="title" placeholder="e.g. Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" placeholder="e.g. 500" step="0.01" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select id="type" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" required>
                                    <option value="Food">Food</option>
                                    <option value="Travel">Travel</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Salary">Salary</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn primary-btn"><i class="fas fa-plus"></i> <span
                                    id="submit-btn-text">Add Transaction</span></button>
                            <button type="button" class="btn outline-btn hidden" id="cancel-edit-btn">Cancel</button>
                        </div>
                    </form>
                </section>

                <section class="chart-container card">
                    <h3>Expense Distribution</h3>
                    <div class="canvas-wrapper">
                        <canvas id="expense-chart"></canvas>
                    </div>
                </section>
            </div>

            <!-- Right Column: Recent Transactions -->
            <div class="right-column">
                <section class="transactions card">
                    <div class="section-header">
                        <h3>Recent Transactions</h3>
                        <div class="controls">
                            <input type="text" id="search-input" placeholder="Search by title..." autocomplete="off">
                            <select id="filter-category" aria-label="Filter by Category">
                                <option value="All">All Categories</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Bills">Bills</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Salary">Salary</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="transactions-list" id="transactions-list">
                        <!-- Transactions injected by JS -->
                    </div>
                    <div id="empty-state" class="empty-state hidden">
                        <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png"
                            alt="No transactions" />
                        <p>No transactions found.</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
